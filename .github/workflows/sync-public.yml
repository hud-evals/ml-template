name: Sync to public repo

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to public repo
        env:
          PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          git clone "https://x-access-token:${PAT}@github.com/hud-evals/sdlc-template-public.git" /tmp/public
          rsync -a --delete --exclude='.git' --exclude='.github' --exclude='.venv' --exclude='__pycache__' --exclude='.ruff_cache' --exclude='.env' --exclude='*.egg-info' --exclude='.hud' --exclude='.hud_eval.toml' --exclude='hud.lock.yaml' . /tmp/public/
          cd /tmp/public
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "sync contents"
          git push origin main
